name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/tradingjournal?schema=public"
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

# To enable this workflow, copy this file to:
# .github/workflows/ci.yml
# Push it using a GitHub token/user with the `workflow` scope.
# Hermes could not push this file directly because the current OAuth credential lacks `workflow` scope.

